<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Paddle</title>
  <style>
    body { margin: 0; background: #16213e; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    canvas { border: 1px solid #333; background: #0f3460; }
    p { margin: 0.5rem; }
  </style>
</head>
<body>
  <p>Paddle — click to score</p>
  <canvas id="c" width="400" height="300"></canvas>
  <script>
    const ALLOWED = ['READY','HEARTBEAT','SAVE_WRITE','SAVE_READ_RESPONSE','GAME_OVER','SCORE','REQUEST_FULLSCREEN','AUDIO_MUTE'];
    let score = 0;

    function send(type, payload) {
      if (!ALLOWED.includes(type)) return;
      parent.postMessage({ type, payload }, '*');
    }

    send('READY');
    setInterval(() => send('HEARTBEAT'), 3000);

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e94560';
    ctx.fillRect(180, 260, 40, 8);

    canvas.addEventListener('click', () => {
      score++;
      send('SCORE', { score });
      send('SAVE_WRITE', { slot: 'progress', data: JSON.stringify({ score }) });
    });

    window.addEventListener('message', (e) => {
      const { type, payload } = e.data || {};
      if (type === 'SAVE_READ') {
        send('SAVE_READ_RESPONSE', { slot: payload?.slot, data: null });
      }
      if (type === 'AUDIO_MUTE_CHANGED' && payload?.muted) {
        document.body.style.opacity = '0.7';
      }
    });
  </script>
</body>
</html>
