<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Pixel Drift</title>
  <style>
    body{margin:0;background:#0a0a0a;overflow:hidden}
    canvas{display:block;margin:0 auto;background:#111}
  </style>
</head>
<body>
<canvas id="c" width="400" height="400"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const o=location.origin;
let px=200, score=0, hazards=[];

parent.postMessage({type:'READY'},o);
setInterval(()=>parent.postMessage({type:'HEARTBEAT'},o),3000);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') px=Math.max(10,px-20);
  if(e.key==='ArrowRight') px=Math.min(390,px+20);
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  px=e.clientX-r.left;
});

function loop(){
  ctx.fillStyle='#111'; ctx.fillRect(0,0,400,400);
  if(Math.random()<0.05) hazards.push({x:Math.random()*380,y:0});
  ctx.fillStyle='#00ff88'; ctx.fillRect(px-10,370,20,20);
  hazards.forEach((h,i)=>{
    h.y+=4;
    ctx.fillStyle='#ff0088'; ctx.fillRect(h.x,h.y,12,12);
    if(Math.abs(h.x-px)<15 && h.y>360){ score++; parent.postMessage({type:'SCORE',payload:{score}},o); hazards.splice(i,1); }
    if(h.y>400) hazards.splice(i,1);
  });
  ctx.fillStyle='#eee'; ctx.fillText('Score: '+score,10,20);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
